<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>US Housing, Inflation & Mortgage Rates (1980–Present)</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f1117;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 16px;
    }
    h1 {
      font-size: 1.4rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      margin-bottom: 6px;
      text-align: center;
    }
    .subtitle {
      font-size: 0.82rem;
      color: #888;
      margin-bottom: 28px;
      text-align: center;
    }
    .chart-container {
      position: relative;
      width: 100%;
      max-width: 960px;
      background: #1a1d27;
      border-radius: 12px;
      padding: 28px 24px 16px;
      box-shadow: 0 4px 32px rgba(0,0,0,0.5);
    }
    .sources {
      margin-top: 14px;
      font-size: 0.72rem;
      color: #555;
      text-align: center;
    }
    .zero-line { color: #555; }
  </style>
</head>
<body>
  <h1>United States: House Prices, Inflation &amp; Mortgage Rates</h1>
  <p class="subtitle">Annual data, 1980–2024 &nbsp;|&nbsp; Year-over-Year % change / Rate %</p>

  <div class="chart-container">
    <canvas id="chart"></canvas>
  </div>
  <p class="sources">
    Sources: FHFA House Price Index (HPI YoY), BLS Consumer Price Index (CPI YoY), Freddie Mac PMMS 30-Year Fixed Mortgage Rate
  </p>

  <script>
    const years = [
      1980,1981,1982,1983,1984,1985,1986,1987,1988,1989,
      1990,1991,1992,1993,1994,1995,1996,1997,1998,1999,
      2000,2001,2002,2003,2004,2005,2006,2007,2008,2009,
      2010,2011,2012,2013,2014,2015,2016,2017,2018,2019,
      2020,2021,2022,2023,2024
    ];

    // FHFA House Price Index — annual YoY % change
    const hpi = [
      10.0, 6.3, 1.5, 5.9, 8.7, 8.0, 9.0,10.0, 9.5, 6.5,
       2.0,-0.5, 1.5, 2.0, 3.0, 3.5, 4.0, 5.0, 6.5, 7.5,
       9.2, 8.5, 9.0,10.0,13.0,15.0, 7.0,-2.0,-8.0,-4.0,
      -1.5,-3.5, 5.5,10.5, 5.7, 5.8, 6.2, 6.3, 5.1, 4.6,
      10.4,18.9,10.0, 5.5, 4.7
    ];

    // BLS CPI — annual average YoY % change
    const cpi = [
      13.5,10.3, 6.1, 3.2, 4.3, 3.6, 1.9, 3.7, 4.1, 4.8,
       5.4, 4.2, 3.0, 3.0, 2.6, 2.8, 3.0, 2.3, 1.6, 2.2,
       3.4, 2.8, 1.6, 2.3, 2.7, 3.4, 3.2, 2.9, 3.8,-0.4,
       1.6, 3.2, 2.1, 1.5, 1.6, 0.1, 1.3, 2.1, 2.4, 1.8,
       1.2, 4.7, 8.0, 4.1, 2.9
    ];

    // Freddie Mac PMMS — annual average 30-year fixed mortgage rate %
    const mortgage = [
      13.74,16.64,16.04,13.24,13.87,12.43,10.19,10.21,10.34,10.32,
      10.13, 9.25, 8.39, 7.31, 8.38, 7.93, 7.81, 7.60, 6.94, 7.44,
       8.05, 6.97, 6.54, 5.83, 5.84, 5.87, 6.41, 6.34, 6.03, 5.04,
       4.69, 4.45, 3.66, 3.98, 4.17, 3.85, 3.65, 3.99, 4.54, 3.94,
       3.11, 2.96, 5.34, 6.81, 6.72
    ];

    const ctx = document.getElementById('chart').getContext('2d');

    new Chart(ctx, {
      type: 'line',
      data: {
        labels: years,
        datasets: [
          {
            label: 'House Price Index YoY (%)',
            data: hpi,
            borderColor: '#4fc3f7',
            backgroundColor: 'rgba(79,195,247,0.08)',
            borderWidth: 2.5,
            pointRadius: 3,
            pointHoverRadius: 6,
            tension: 0.3,
            fill: false,
            yAxisID: 'y',
          },
          {
            label: 'Inflation Rate — CPI YoY (%)',
            data: cpi,
            borderColor: '#ef5350',
            backgroundColor: 'rgba(239,83,80,0.08)',
            borderWidth: 2.5,
            pointRadius: 3,
            pointHoverRadius: 6,
            tension: 0.3,
            fill: false,
            yAxisID: 'y',
          },
          {
            label: '30-Year Mortgage Rate (%)',
            data: mortgage,
            borderColor: '#66bb6a',
            backgroundColor: 'rgba(102,187,106,0.08)',
            borderWidth: 2.5,
            pointRadius: 3,
            pointHoverRadius: 6,
            tension: 0.3,
            fill: false,
            yAxisID: 'y',
          }
        ]
      },
      options: {
        responsive: true,
        interaction: {
          mode: 'index',
          intersect: false,
        },
        plugins: {
          legend: {
            position: 'top',
            labels: {
              color: '#ccc',
              font: { size: 12 },
              padding: 20,
              usePointStyle: true,
              pointStyleWidth: 18,
            }
          },
          tooltip: {
            backgroundColor: '#1e2130',
            titleColor: '#fff',
            bodyColor: '#ccc',
            borderColor: '#333',
            borderWidth: 1,
            padding: 12,
            callbacks: {
              label: ctx => ` ${ctx.dataset.label}: ${ctx.parsed.y.toFixed(2)}%`
            }
          }
        },
        scales: {
          x: {
            ticks: {
              color: '#888',
              maxTicksLimit: 15,
              font: { size: 11 },
            },
            grid: { color: 'rgba(255,255,255,0.05)' },
          },
          y: {
            ticks: {
              color: '#888',
              font: { size: 11 },
              callback: v => v + '%'
            },
            grid: { color: 'rgba(255,255,255,0.07)' },
            title: {
              display: true,
              text: 'Percent (%)',
              color: '#666',
              font: { size: 11 }
            }
          }
        }
      }
    });
  </script>
</body>
</html>
